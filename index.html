<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TATAR CLOUD OS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
            --bg: #050505;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .app { display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 10px; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; }

        /* Вкладки/Страницы */
        .page { display: none; flex-direction: column; height: 100%; gap: 15px; animation: slideUp 0.4s ease; }
        .page.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Навигация */
        nav { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links span { cursor: pointer; opacity: 0.6; font-size: 0.9rem; transition: 0.3s; }
        .nav-links span:hover, .nav-links span.active { opacity: 1; text-shadow: 0 0 10px #fff; }

        /* Главная */
        .search-bar { width: 100%; padding: 15px; font-size: 1rem; margin-bottom: 20px; }
        .top-scripts { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; overflow-y: auto; }
        .script-card { padding: 20px; position: relative; transition: 0.3s; cursor: pointer; }
        .script-card:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* Редактор */
        #monaco-root { flex-grow: 1; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .editor-tools { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px; }

        /* Ввод и Кнопки */
        input, button, textarea {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; padding: 12px; border-radius: 8px; font-family: inherit;
        }
        button { background: #fff; color: #000; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.8; }
        button.sec { background: transparent; color: #fff; border: 1px solid #fff; }

        /* Авторизация */
        .auth-form { max-width: 350px; margin: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; text-align: center; }

        @media (max-width: 700px) {
            .top-scripts { grid-template-columns: 1fr; }
            .nav-links span { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="app">
    <nav class="glass">
        <div style="font-weight: 800; letter-spacing: 2px;">TATAR CLOUD</div>
        <div class="nav-links">
            <span onclick="go('home')" id="l-home">HOME</span>
            <span onclick="go('editor')" id="l-editor">EDITOR</span>
            <span onclick="go('auth')" id="l-auth">ACCOUNT</span>
        </div>
    </nav>

    <!-- СТРАНИЦА: ГЛАВНАЯ -->
    <section id="p-home" class="page active">
        <input type="text" class="glass search-bar" placeholder="Search scripts by name..." id="script-search" oninput="searchScripts()">
        <h4 style="margin: 0;">TOP COMMUNITY SCRIPTS</h4>
        <div class="top-scripts" id="global-scripts">
            <!-- Скрипты загрузятся здесь -->
        </div>
    </section>

    <!-- СТРАНИЦА: РЕДАКТОР -->
    <section id="p-editor" class="page">
        <div class="editor-tools glass">
            <input type="text" id="ed-name" placeholder="Project Name" style="flex: 2;">
            <input type="password" id="ed-pass" placeholder="Edit Password" style="flex: 1;">
            <button onclick="saveProject()">SAVE / UPDATE</button>
            <button class="sec" onclick="obfuscate()">OBFUSCATE</button>
        </div>
        <div id="monaco-root"></div>
        <div class="editor-tools glass" style="justify-content: space-between;">
            <button class="sec" onclick="checkSecurity()">SCAN SECURITY</button>
            <button class="sec" onclick="copyLoader()">COPY LOADSTRING</button>
            <div id="user-tag" style="font-size: 0.7rem; opacity: 0.5;">Guest Mode</div>
        </div>
    </section>

    <!-- СТРАНИЦА: АВТОРИЗАЦИЯ -->
    <section id="p-auth" class="page">
        <div class="auth-form glass" id="form-login">
            <h2 id="auth-title">CLOUD LOGIN</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="handleAuth('login')">LOGIN</button>
            <span style="font-size: 0.8rem; cursor: pointer;" onclick="toggleAuth(true)">Don't have an account? Register</span>
        </div>
    </section>
</div>

<script>
    // --- КОНФИГУРАЦИЯ ---
    const DB = {
        TOKEN: "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",
        REPO: "SITEspinogrz/tatarscripts",
        OBF_KEY: "d6eee16f-4aee-b083-6b0c-80fd3996c669e97b"
    };

    let editor, currentUser = null;
    lucide.createIcons();

    // --- ЗВЕЗДЫ ---
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    }
    function drawStars() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        for(let i=0; i<80; i++) {
            ctx.globalAlpha = Math.random();
            ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2); ctx.fill();
        }
        setTimeout(() => requestAnimationFrame(drawStars), 100);
    }
    initStars(); drawStars();

    // --- НАВИГАЦИЯ ---
    function go(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-links span').forEach(s => s.classList.remove('active'));
        document.getElementById('p-' + page).classList.add('active');
        document.getElementById('l-' + page).classList.add('active');
        if(page === 'home') loadGlobalScripts();
    }

    function toggleAuth(reg) {
        document.getElementById('auth-title').innerText = reg ? "REGISTER" : "LOGIN";
        const btn = document.querySelector('#form-login button');
        btn.innerText = reg ? "CREATE ACCOUNT" : "LOGIN";
        btn.onclick = () => handleAuth(reg ? 'reg' : 'login');
    }

    // --- МОНАКО ---
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' } });
    require(['vs/editor/editor.main'], () => {
        editor = monaco.editor.create(document.getElementById('monaco-root'), {
            value: "-- TATAR CLOUD EDITOR\n-- Write or Search your projects",
            language: 'lua', theme: 'vs-dark', fontSize: 14, automaticLayout: true,
            minimap: { enabled: false }
        });
    });

    // --- ЯДРО: АВТОРИЗАЦИЯ ---
    async function handleAuth(type) {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        if(!user || !pass) return alert("Fill data");

        const userHash = CryptoJS.SHA256(user).toString();
        const passHash = CryptoJS.SHA256(pass).toString();
        const path = `users/${userHash}.json`;

        if(type === 'reg') {
            const res = await fetch(`https://api.github.com/repos/${DB.REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { Authorization: `token ${DB.TOKEN}` },
                body: JSON.stringify({
                    message: "New user",
                    content: btoa(JSON.stringify({ user, pass: passHash }))
                })
            });
            if(res.ok) alert("Registered! Now Login.");
        } else {
            const res = await fetch(`https://api.github.com/repos/${DB.REPO}/contents/${path}`, {
                headers: { Authorization: `token ${DB.TOKEN}` }
            });
            if(res.ok) {
                const data = JSON.parse(atob((await res.json()).content));
                if(data.pass === passHash) {
                    currentUser = user;
                    document.getElementById('user-tag').innerText = "Logged as: " + user;
                    go('editor');
                } else alert("Wrong password");
            } else alert("User not found");
        }
    }

    // --- ЯДРО: БЕЗОПАСНОСТЬ (AI Scanner) ---
    function checkSecurity() {
        const code = editor.getValue();
        const dangerous = [
            "os.execute", "os.remove", "os.rename", "rm -rf", ":PostAsync", 
            "gethwid", "getgenv", ".exe", "crash", "while true do end"
        ];
        
        let threats = [];
        dangerous.forEach(word => {
            if(code.toLowerCase().includes(word.toLowerCase())) threats.push(word);
        });

        if(threats.length > 0) {
            alert("🛑 SECURITY ALERT!\nMalicious code detected: " + threats.join(", "));
            return false;
        }
        alert("✅ Code is safe. Phone protection verified.");
        return true;
    }

    // --- ЯДРО: СОХРАНЕНИЕ И ОБНОВЛЕНИЕ ---
    async function saveProject() {
        if(!currentUser) return alert("Login first!");
        if(!checkSecurity()) return;

        const name = document.getElementById('ed-name').value;
        const pass = document.getElementById('ed-pass').value;
        if(!name || !pass) return alert("Project Name and Password required!");

        const code = editor.getValue();
        const projectHash = CryptoJS.SHA256(pass).toString();
        const path = `scripts/${name}.lua`;
        const body = `-- [[ OWNER: ${currentUser} | KEY: ${projectHash} ]]\n${code}`;

        const check = await fetch(`https://api.github.com/repos/${DB.REPO}/contents/${path}`, {
            headers: { Authorization: `token ${DB.TOKEN}` }
        });

        let sha;
        if(check.ok) {
            const data = await check.json();
            const content = decodeURIComponent(escape(atob(data.content)));
            if(!content.includes(projectHash)) return alert("Access Denied: Wrong project password!");
            sha = data.sha;
        }

        const res = await fetch(`https://api.github.com/repos/${DB.REPO}/contents/${path}`, {
            method: 'PUT',
            headers: { Authorization: `token ${DB.TOKEN}` },
            body: JSON.stringify({
                message: "Sync: " + name,
                content: btoa(unescape(encodeURIComponent(body))),
                sha: sha
            })
        });

        if(res.ok) alert("Project Saved Successfully!");
    }

    // --- ГЛАВНАЯ СТРАНИЦА: ПОИСК ---
    async function loadGlobalScripts() {
        const res = await fetch(`https://api.github.com/repos/${DB.REPO}/contents/scripts`, {
            headers: { Authorization: `token ${DB.TOKEN}` }
        });
        if(res.ok) {
            const files = await res.json();
            window.allScripts = files;
            renderScripts(files);
        }
    }

    function renderScripts(files) {
        const container = document.getElementById('global-scripts');
        container.innerHTML = '';
        files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'glass script-card';
            div.innerHTML = `<b>${f.name.replace('.lua','')}</b><br><small>Cloud Script</small>`;
            div.onclick = () => {
                document.getElementById('ed-name').value = f.name.replace('.lua','');
                loadProjectToEditor(f.path);
            };
            container.appendChild(div);
        });
    }

    async function loadProjectToEditor(path) {
        const res = await fetch(`https://api.github.com/repos/${DB.REPO}/contents/${path}`, {
            headers: { Authorization: `token ${DB.TOKEN}` }
        });
        if(res.ok) {
            const data = await res.json();
            const raw = decodeURIComponent(escape(atob(data.content)));
            editor.setValue(raw.split('\n').slice(1).join('\n'));
            go('editor');
        }
    }

    function searchScripts() {
        const query = document.getElementById('script-search').value.toLowerCase();
        const filtered = window.allScripts.filter(f => f.name.toLowerCase().includes(query));
        renderScripts(filtered);
    }

    async function obfuscate() {
        try {
            const res = await fetch('https://luaobfuscator.com/api/obfuscator/newscript', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', apikey: DB.OBF_KEY },
                body: JSON.stringify({ script: editor.getValue(), options: { Virtualize: true } })
            });
            const data = await res.json();
            if(data.code) editor.setValue(data.code);
        } catch(e) { alert("Obfuscator Offline"); }
    }

    function copyLoader() {
        const name = document.getElementById('ed-name').value;
        const link = `loadstring(game:HttpGet("https://raw.githubusercontent.com/${DB.REPO}/main/scripts/${name}.lua"))()`;
        navigator.clipboard.writeText(link);
        alert("Link copied!");
    }
</script>
</body>
</html>
