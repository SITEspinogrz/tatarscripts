<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TATAR | Cloud OS v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/editor/editor.main.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --blur: blur(20px);
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            /* Исправление для мобильных браузеров */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #starfield {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid white;
        }

        /* Оптимизация скролла */
        .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Контейнер редактора */
        #monaco-outer {
            flex: 1;
            min-height: 0; /* Важно для flex-контейнеров */
            border-radius: 12px;
            overflow: hidden;
        }

        .tab-content { 
            display: none; 
            height: 100%;
            flex-direction: column;
        }
        .tab-content.active { display: flex; }

        input, button { touch-action: manipulation; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <!-- MAIN UI WRAPPER -->
    <main class="relative z-10 flex flex-col h-full w-full p-3 md:p-6 gap-3 md:gap-4 overflow-hidden">
        
        <!-- HEADER NAV -->
        <nav class="glass rounded-2xl p-1.5 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-2 px-3">
                <i data-lucide="cloud-lightning" class="w-4 h-4 md:w-5 md:h-5"></i>
                <span class="font-bold tracking-tighter text-xs md:text-sm">TATAR <span class="font-thin opacity-40">OS</span></span>
            </div>
            
            <div class="flex gap-1">
                <button onclick="switchTab('explore')" class="nav-btn active px-3 py-1.5 rounded-lg text-[10px] uppercase font-bold tracking-widest flex items-center gap-2">
                    <i data-lucide="search" size="12"></i> <span class="hidden md:inline">Explore</span>
                </button>
                <button onclick="switchTab('editor')" class="nav-btn px-3 py-1.5 rounded-lg text-[10px] uppercase font-bold tracking-widest flex items-center gap-2">
                    <i data-lucide="code" size="12"></i> <span class="hidden md:inline">Editor</span>
                </button>
                <button onclick="switchTab('account')" class="nav-btn px-3 py-1.5 rounded-lg text-[10px] uppercase font-bold tracking-widest flex items-center gap-2">
                    <i data-lucide="user" size="12"></i> <span class="hidden md:inline">Account</span>
                </button>
            </div>
        </nav>

        <!-- CONTENT AREA -->
        <div class="flex-1 min-h-0 relative">
            
            <!-- EXPLORE -->
            <div id="explore" class="tab-content active gap-4">
                <div class="glass p-2 rounded-xl flex gap-2 shrink-0">
                    <input type="text" id="search-bar" placeholder="Search scripts..." class="flex-1 bg-transparent border-none px-3 text-sm focus:outline-none">
                    <button onclick="loadScripts()" class="p-2 hover:bg-white/5 rounded-lg"><i data-lucide="refresh-cw" size="18"></i></button>
                </div>
                <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-3 gap-3 overflow-y-auto custom-scroll pb-10">
                    <div class="glass p-10 text-center opacity-30 text-xs uppercase tracking-widest col-span-full">Initialize account to load data</div>
                </div>
            </div>

            <!-- EDITOR (The Core) -->
            <div id="editor" class="tab-content gap-3">
                <div class="flex flex-col lg:flex-row gap-3 h-full min-h-0">
                    
                    <!-- Editor Block -->
                    <div class="flex-[3] flex flex-col min-h-0">
                        <div class="flex gap-1 mb-2 shrink-0">
                            <button onclick="setEditorView('lua')" id="lua-tab-btn" class="glass px-4 py-1.5 text-[9px] font-black rounded-t-lg border-b-2 border-white">LUA</button>
                            <button onclick="setEditorView('ai')" id="ai-tab-btn" class="glass px-4 py-1.5 text-[9px] font-black rounded-t-lg opacity-40">AI ASSISTANT</button>
                        </div>
                        
                        <div id="lua-view" class="flex-1 flex flex-col min-h-0">
                            <div id="monaco-outer" class="glass border-white/10">
                                <div id="monaco-container" class="h-full w-full"></div>
                            </div>
                            <!-- Action Buttons -->
                            <div class="grid grid-cols-2 md:flex gap-2 mt-2 shrink-0">
                                <button onclick="saveToCloud()" class="bg-white text-black font-black text-[10px] py-2.5 px-4 rounded-lg flex items-center justify-center gap-2">
                                    <i data-lucide="save" size="14"></i> SAVE
                                </button>
                                <button onclick="obfuscateCode()" class="glass font-bold text-[10px] py-2.5 px-4 rounded-lg flex items-center justify-center gap-2">
                                    <i data-lucide="shield" size="14"></i> OBFUSCATE
                                </button>
                                <button onclick="generateLoadstring()" class="glass font-bold text-[10px] py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 col-span-2 md:col-auto">
                                    <i data-lucide="link" size="14"></i> COPY LOADSTRING
                                </button>
                            </div>
                        </div>

                        <div id="ai-view" class="hidden flex-1 flex flex-col min-h-0 glass rounded-xl p-3">
                            <div id="chat-history" class="flex-1 overflow-y-auto custom-scroll space-y-3 mb-3 text-xs pr-2">
                                <div class="opacity-40 italic text-center py-10 text-[10px]">AI ready to help with Lua 5.1</div>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <input type="text" id="ai-input" placeholder="Ask AI..." class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-xs">
                                <button onclick="askAI()" class="bg-white text-black px-4 rounded-lg font-black text-[10px]">SEND</button>
                            </div>
                        </div>
                    </div>

                    <!-- Side Tools -->
                    <div class="flex-1 flex flex-col gap-3 shrink-0 lg:max-w-[300px]">
                        <div class="glass p-4 rounded-xl">
                            <label class="text-[9px] font-black opacity-30 uppercase mb-2 block tracking-tighter">Project Protection</label>
                            <input type="password" id="master-pass" placeholder="Master Key" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-xs mb-1">
                        </div>
                        <div class="glass p-4 rounded-xl flex-1 hidden md:flex flex-col min-h-0">
                            <label class="text-[9px] font-black opacity-30 uppercase mb-2 block tracking-tighter">Security Log</label>
                            <div id="security-log" class="text-[10px] font-mono text-green-500/70 overflow-y-auto custom-scroll">
                                > System idle...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ACCOUNT -->
            <div id="account" class="tab-content items-center justify-center">
                <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
                    <i data-lucide="fingerprint" size="40" class="mx-auto mb-4 opacity-20"></i>
                    <h2 class="text-sm font-black tracking-widest mb-6">CLOUD ACCESS</h2>
                    <div class="space-y-3">
                        <input type="text" id="auth-user" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm">
                        <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm">
                        <button onclick="handleAuth('login')" class="w-full bg-white text-black font-black py-3 rounded-xl text-xs">LOGIN</button>
                        <button onclick="handleAuth('register')" class="w-full glass py-3 rounded-xl text-xs font-bold opacity-60">CREATE ACCOUNT</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script>
        const CFG = {
            token: "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",
            repo: "SITEspinogrz/tatarscripts",
            obf: "d6eee16f-4aee-b083-6b0c-80fd3996c669e97b"
        };

        let editor, currentUser = null, activeFile = null;

        // --- OPTIMIZED STARFIELD ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const isMobile = window.innerWidth < 768;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            initStars();
        }

        function initStars() {
            stars = [];
            const count = isMobile ? 80 : 200; // Оптимизация количества
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    s: Math.random() * 1.2,
                    o: Math.random(),
                    v: Math.random() * 0.02
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                s.o += s.v;
                if(s.o > 1 || s.o < 0) s.v = -s.v;
                ctx.globalAlpha = s.o;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', resize);
        resize(); animate();

        // --- CORE SYSTEM ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'explore' && currentUser) loadScripts();
        }

        function setEditorView(v) {
            document.getElementById('lua-view').classList.toggle('hidden', v !== 'lua');
            document.getElementById('ai-view').classList.toggle('hidden', v !== 'ai');
            document.getElementById('lua-tab-btn').style.opacity = v === 'lua' ? '1' : '0.4';
            document.getElementById('ai-tab-btn').style.opacity = v === 'ai' ? '1' : '0.4';
        }

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], () => {
            editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: '-- TATAR OS Ready\nprint("Hello mobile world")',
                language: 'lua',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 13,
                minimap: { enabled: false },
                lineNumbers: "on",
                backgroundColor: 'rgba(0,0,0,0)'
            });
        });

        // --- API HELPERS ---
        async function gh(path, method = 'GET', body = null) {
            const res = await fetch(`https://api.github.com/repos/${CFG.repo}/contents/${path}`, {
                method,
                headers: { 'Authorization': `token ${CFG.token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: body ? JSON.stringify(body) : null
            });
            return res.json();
        }

        async function handleAuth(type) {
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            if(!u || !p) return;
            const hash = CryptoJS.SHA256(p).toString();
            const path = `users/${u}.json`;

            if(type === 'register') {
                const data = btoa(JSON.stringify({ u, pass: hash }));
                await gh(path, 'PUT', { message: `reg ${u}`, content: data });
                alert("Success!");
            } else {
                const res = await gh(path);
                if(res.content && JSON.parse(atob(res.content)).pass === hash) {
                    currentUser = u;
                    switchTab('explore');
                } else alert("Error!");
            }
        }

        async function loadScripts() {
            const grid = document.getElementById('scripts-grid');
            grid.innerHTML = '<div class="col-span-full opacity-50 text-[10px]">FETCHING DATA...</div>';
            const data = await gh('scripts');
            grid.innerHTML = '';
            if(Array.isArray(data)) {
                data.forEach(f => {
                    if(!f.name.endsWith('.lua')) return;
                    const el = document.createElement('div');
                    el.className = "glass p-4 rounded-xl flex justify-between items-center";
                    el.innerHTML = `<div><div class="text-xs font-bold">${f.name}</div><div class="text-[9px] opacity-30 uppercase">Script File</div></div>
                                    <button onclick="openS('${f.path}')" class="bg-white/10 p-2 rounded-lg hover:bg-white hover:text-black transition"><i data-lucide="edit-3" size="14"></i></button>`;
                    grid.appendChild(el);
                });
                lucide.createIcons();
            }
        }

        async function openS(path) {
            const res = await gh(path);
            editor.setValue(atob(res.content));
            activeFile = { path, sha: res.sha };
            switchTab('editor');
        }

        async function saveToCloud() {
            if(!currentUser) return alert("Login first");
            const code = editor.getValue();
            const dangerous = ["os.execute", "PostAsync", "gethwid", "crash"].some(t => code.includes(t));
            if(dangerous) return alert("SECURITY ALERT: Malicious code detected. Save blocked.");

            const name = prompt("File name:", activeFile ? activeFile.path.split('/').pop() : "script.lua");
            if(!name) return;

            const res = await gh(`scripts/${name}`, 'PUT', {
                message: `update ${name}`,
                content: btoa(code),
                sha: activeFile?.sha
            });
            if(res.content) alert("Saved!");
        }

        async function askAI() {
            const q = document.getElementById('ai-input').value;
            if(!q) return;
            const hist = document.getElementById('chat-history');
            hist.innerHTML += `<div class="bg-white/5 p-2 rounded-lg ml-4">${q}</div>`;
            document.getElementById('ai-input').value = '';
            
            const res = await puter.ai.chat(q + " (Return only Lua code blocks if possible)");
            hist.innerHTML += `<div class="bg-white/10 p-2 rounded-lg mr-4 border border-white/5">${res.message.content}</div>`;
            hist.scrollTop = hist.scrollHeight;
        }

        function generateLoadstring() {
            if(!activeFile) return alert("Save to cloud first");
            const url = `https://raw.githubusercontent.com/${CFG.repo}/main/${activeFile.path}`;
            navigator.clipboard.writeText(`loadstring(game:HttpGet("${url}"))()`);
            alert("Copied!");
        }

        lucide.createIcons();
    </script>
</body>
</html>
