<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TATAR HUB OS</title>
    
    <!-- Библиотеки -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.2);
            --bg: #050505;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        canvas#stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .app-shell { display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 10px; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 12px; }

        /* Верхняя Навигация */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; min-height: 60px; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-btn { background: none; border: 1px solid transparent; color: var(--white); opacity: 0.5; padding: 8px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { opacity: 1; border-color: var(--border); background: var(--glass); }

        /* Контент */
        .main-content { flex-grow: 1; position: relative; overflow: hidden; }
        .page { display: none; height: 100%; flex-direction: column; gap: 10px; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Поиск и Сетки */
        .search-box { width: 100%; padding: 12px; font-size: 1rem; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; overflow-y: auto; padding-bottom: 20px; }
        .card { padding: 15px; border-radius: 10px; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; text-align: center; }
        .card:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* Внутренние вкладки РЕДАКТОРА */
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; border-bottom: 1px solid var(--border); }
        .editor-tabs { display: flex; gap: 5px; }
        .e-tab { padding: 5px 12px; font-size: 0.75rem; cursor: pointer; opacity: 0.5; border-radius: 5px; }
        .e-tab.active { opacity: 1; background: rgba(255,255,255,0.1); }

        /* Редактор и Чат */
        #monaco-root { flex-grow: 1; overflow: hidden; border-radius: 0 0 10px 10px; }
        .ai-wrap { flex-grow: 1; display: none; flex-direction: column; padding: 15px; }
        .ai-wrap.active { display: flex; }
        #chat-history { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 8px; font-size: 0.85rem; max-width: 85%; line-height: 1.4; }
        .bubble.ai { background: rgba(255,255,255,0.1); align-self: flex-start; border-left: 2px solid #fff; }
        .bubble.user { background: rgba(255,255,255,0.05); align-self: flex-end; }

        /* Кнопки и Инпуты */
        input, button, textarea { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #fff; border-radius: 6px; padding: 10px; }
        button { background: #fff; color: #000; font-weight: bold; cursor: pointer; border: none; font-size: 0.75rem; }
        button.border { background: transparent; color: #fff; border: 1px solid #fff; }
        button:active { transform: scale(0.96); }

        /* Центрирование форм */
        .auth-container { max-width: 350px; margin: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; text-align: center; }

        @media (max-width: 750px) {
            .nav-btn span { display: none; }
            .top-nav { padding: 5px 10px; }
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="app-shell">
    <!-- ГЛАВНОЕ МЕНЮ СВЕРХУ -->
    <nav class="top-nav glass">
        <div style="font-weight: 800; letter-spacing: 1px;">TATAR HUB</div>
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="nav('home', this)"><i data-lucide="search"></i><span>EXPLORE</span></button>
            <button class="nav-btn" onclick="nav('editor', this)"><i data-lucide="code"></i><span>EDITOR</span></button>
            <button class="nav-btn" onclick="nav('auth', this)"><i data-lucide="user"></i><span>ACCOUNT</span></button>
        </div>
    </nav>

    <main class="main-content">
        <!-- ГЛАВНАЯ: ПОИСК -->
        <section id="p-home" class="page active">
            <input type="text" id="global-search" class="glass search-box" placeholder="Search community scripts..." oninput="searchScripts()">
            <div class="grid" id="script-grid"></div>
        </section>

        <!-- РЕДАКТОР С ВКЛАДКАМИ -->
        <section id="p-editor" class="page glass">
            <div class="editor-header">
                <div class="editor-tabs">
                    <span class="e-tab active" onclick="eTab('code')">SCRIPT.LUA</span>
                    <span class="e-tab" onclick="eTab('ai')">AI ASSISTANT</span>
                </div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="ed-name" placeholder="Name" style="height:25px; font-size:10px; width:100px;">
                    <input type="password" id="ed-pass" placeholder="Pass" style="height:25px; font-size:10px; width:80px;">
                    <button onclick="deploy()" style="height:25px; padding:0 10px;">SAVE</button>
                </div>
            </div>
            
            <div id="monaco-root"></div>
            
            <div id="ai-section" class="ai-wrap">
                <div id="chat-history"></div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <input type="text" id="ai-input" placeholder="Ask AI to write logic..." style="flex:1;">
                    <button onclick="askAI()">GENERATE</button>
                </div>
            </div>

            <div class="editor-header" style="border-top:1px solid var(--border); border-bottom:none;">
                <div style="display:flex; gap:10px;">
                    <button class="border" onclick="obfuscate()" style="height:25px;">OBFUSCATE</button>
                    <button class="border" onclick="copyLink()" style="height:25px;">COPY LINK</button>
                </div>
                <div id="user-info" style="font-size: 10px; opacity:0.4;">Guest Mode</div>
            </div>
        </section>

        <!-- АККАУНТ -->
        <section id="p-auth" class="page">
            <div class="auth-container glass" id="auth-ui">
                <h2 id="auth-title">WELCOME</h2>
                <input type="text" id="login-user" placeholder="Username">
                <input type="password" id="login-pass" placeholder="Password">
                <button onclick="authAction('login')">SIGN IN</button>
                <span style="font-size:0.7rem; opacity:0.5; cursor:pointer;" onclick="toggleAuth(true)">New here? Create Account</span>
            </div>
        </section>
    </main>
</div>

<script>
    // --- ДАННЫЕ ---
    const DB = {
        TK: "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",
        RP: "SITEspinogrz/tatarscripts",
        OK: "d6eee16f-4aee-b083-6b0c-80fd3996c669e97b"
    };

    let editor, currentUser = null;
    lucide.createIcons();

    // --- ЗВЕЗДЫ ---
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function drawStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = "#fff";
        for(let i=0; i<100; i++) {
            ctx.globalAlpha = Math.random();
            ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2); ctx.fill();
        }
        setTimeout(() => requestAnimationFrame(drawStars), 200);
    }
    drawStars();

    // --- НАВИГАЦИЯ ---
    function nav(page, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-'+page).classList.add('active');
        btn.classList.add('active');
        if(page === 'home') syncScripts();
    }

    function eTab(type) {
        document.querySelectorAll('.e-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('monaco-root').style.display = (type === 'code' ? 'block' : 'none');
        document.getElementById('ai-section').classList.toggle('active', type === 'ai');
    }

    function toggleAuth(reg) {
        document.getElementById('auth-title').innerText = reg ? "REGISTER" : "WELCOME";
        const btn = document.querySelector('#auth-ui button');
        btn.innerText = reg ? "CREATE ACCOUNT" : "SIGN IN";
        btn.onclick = () => authAction(reg ? 'reg' : 'login');
    }

    // --- МОНАКО ---
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' } });
    require(['vs/editor/editor.main'], () => {
        editor = monaco.editor.create(document.getElementById('monaco-root'), {
            value: "-- TATAR CLOUD EDITOR\nprint('System Ready')",
            language: 'lua', theme: 'vs-dark', fontSize: 13, automaticLayout: true, minimap: {enabled:false}
        });
    });

    // --- АВТОРИЗАЦИЯ ---
    async function authAction(mode) {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(!u || !p) return alert("Missing data");

        const uH = CryptoJS.SHA256(u).toString();
        const pH = CryptoJS.SHA256(p).toString();
        const path = `users/${uH}.json`;

        if(mode === 'reg') {
            const res = await fetch(`https://api.github.com/repos/${DB.RP}/contents/${path}`, {
                method: 'PUT', headers: {Authorization: `token ${DB.TK}`},
                body: JSON.stringify({message: "User Reg", content: btoa(JSON.stringify({p: pH}))})
            });
            if(res.ok) alert("Account Created! Please login.");
        } else {
            const res = await fetch(`https://api.github.com/repos/${DB.RP}/contents/${path}`, {
                headers: {Authorization: `token ${DB.TK}`}
            });
            if(res.ok) {
                const data = JSON.parse(atob((await res.json()).content));
                if(data.p === pH) {
                    currentUser = u;
                    document.getElementById('user-info').innerText = "Logged as: " + u;
                    alert("Auth Success!");
                    nav('editor', document.querySelector('[onclick*="editor"]'));
                } else alert("Invalid Password");
            } else alert("User not found");
        }
    }

    // --- СОХРАНЕНИЕ / ОБНОВЛЕНИЕ ---
    async function deploy() {
        if(!currentUser) return alert("Login first!");
        const nm = document.getElementById('ed-name').value;
        const ps = document.getElementById('ed-pass').value;
        const code = editor.getValue();

        // Security Scan
        const danger = ["os.execute", "PostAsync", "os.remove", "gethwid"];
        for(let d of danger) if(code.includes(d)) return alert("MALICIOUS CODE BLOCKED: " + d);

        if(!nm || !ps) return alert("Fill Name/Password");
        const pH = CryptoJS.SHA256(ps).toString();
        const path = `scripts/${nm}.lua`;
        const body = `-- [[ AUTH:${pH} | USER:${currentUser} ]]\n${code}`;

        const check = await fetch(`https://api.github.com/repos/${DB.RP}/contents/${path}`, {
            headers: {Authorization: `token ${DB.TK}`}
        });

        let sha;
        if(check.ok) {
            const data = await check.json();
            if(!atob(data.content).includes(pH)) return alert("Wrong project password!");
            sha = data.sha;
        }

        const res = await fetch(`https://api.github.com/repos/${DB.RP}/contents/${path}`, {
            method: 'PUT', headers: {Authorization: `token ${DB.TK}`},
            body: JSON.stringify({message: "Deploy "+nm, content: btoa(unescape(encodeURIComponent(body))), sha})
        });
        if(res.ok) alert("Synced to Cloud!");
    }

    // --- ПОИСК ---
    async function syncScripts() {
        const res = await fetch(`https://api.github.com/repos/${DB.RP}/contents/scripts`, {
            headers: {Authorization: `token ${DB.TK}`}
        });
        if(res.ok) {
            window.scripts = await res.json();
            renderList(window.scripts);
        }
    }

    function renderList(files) {
        const grid = document.getElementById('script-grid'); grid.innerHTML = '';
        files.forEach(f => {
            const d = document.createElement('div'); d.className = 'card glass';
            d.innerHTML = `<b>${f.name.replace('.lua','')}</b><br><small style="opacity:0.5">Cloud Storage</small>`;
            d.onclick = () => loadScript(f.path);
            grid.appendChild(d);
        });
    }

    async function loadScript(p) {
        const res = await fetch(`https://api.github.com/repos/${DB.RP}/contents/${p}`, {
            headers: {Authorization: `token ${DB.TK}`}
        });
        if(res.ok) {
            const data = await res.json();
            const raw = decodeURIComponent(escape(atob(data.content)));
            editor.setValue(raw.split('\n').slice(1).join('\n'));
            document.getElementById('ed-name').value = data.name.replace('.lua','');
            nav('editor', document.querySelector('[onclick*="editor"]'));
        }
    }

    function searchScripts() {
        const q = document.getElementById('global-search').value.toLowerCase();
        renderList(window.scripts.filter(f => f.name.toLowerCase().includes(q)));
    }

    // --- AI ---
    async function askAI() {
        const q = document.getElementById('ai-input').value; if(!q) return;
        addMsg('user', q); document.getElementById('ai-input').value = '';
        try {
            const res = await puter.ai.chat("Explain or write Roblox Lua code for: " + q);
            addMsg('ai', res.toString());
            if(res.toString().includes("```lua")) {
                const snip = res.toString().split("```lua")[1].split("```")[0];
                editor.setValue(editor.getValue() + "\n\n-- AI Snippet:\n" + snip.trim());
            }
        } catch(e) { addMsg('ai', "AI Connection failed."); }
    }

    function addMsg(t, x) {
        const c = document.getElementById('chat-history');
        const d = document.createElement('div'); d.className = `bubble ${t}`; d.innerText = x;
        c.appendChild(d); c.scrollTop = c.scrollHeight;
    }

    async function obfuscate() {
        try {
            const res = await fetch('https://luaobfuscator.com/api/obfuscator/newscript', {
                method: 'POST', headers: {'Content-Type': 'application/json', apikey: DB.OK},
                body: JSON.stringify({script: editor.getValue(), options: {Virtualize: true}})
            });
            const data = await res.json();
            if(data.code) editor.setValue(data.code);
        } catch(e) { alert("Obfuscator Offline"); }
    }

    function copyLink() {
        const nm = document.getElementById('ed-name').value;
        navigator.clipboard.writeText(`loadstring(game:HttpGet("https://raw.githubusercontent.com/${DB.RP}/main/scripts/${nm}.lua"))()`);
        alert("Loadstring copied!");
    }
</script>
</body>
</html>
